<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xtory - The Living Atlas of Greater Iran</title>
    <meta name="description" content="Explore the history of Greater Iran and surrounding regions with our interactive AI-powered map and timeline." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xtroy.sbs/" />
    <meta property="og:site_name" content="Xtory" />
    <meta property="og:title" content="Xtory - The Living Atlas of Greater Iran" />
    <meta property="og:description" content="Explore the history of Greater Iran and surrounding regions with our interactive AI-powered map and timeline." />
    <meta property="og:image" content="https://xtroy.sbs/Xtory.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://xtroy.sbs/" />
    <meta property="twitter:title" content="Xtory - The Living Atlas of Greater Iran" />
    <meta property="twitter:description" content="Explore the history of Greater Iran and surrounding regions with our interactive AI-powered map and timeline." />
    <meta property="twitter:image" content="https://xtroy.sbs/Xtory.webp" />

    <!-- Mobile Experience & Branding -->
    <meta name="theme-color" content="#020617" />
    <meta name="keywords" content="history, Greater Iran, atlas, interactive timeline, Persian history, AI historical assistant" />
    <meta name="author" content="Xtory" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Xtory" />
    <link rel="canonical" href="https://xtroy.sbs/" />

    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />

    <!--
      Preload critical font files (latin subset only).
      These are the most-used weights and styles that appear above the fold.
      Preloading avoids the invisible-text flash (FOIT) on slow networks.
    -->
    <link rel="preload" href="/fonts/font-7.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/font-14.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/font-28.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/font-34.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/font-48.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

    <!-- DNS prefetch for the only external API we use -->
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
